<head>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        // --- FIREBASE CONFIGURATION ---
        //const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hunt-club-bbq-2026';

        // State
        let currentUser = null;
        let attendees = [];
        let customItems = [];

        const defaultCategories = {
            "Main Dishes": ["Hot Dogs", "Hot Dog Buns", "Hamburgers", "Hamburger Buns", "Veggie Burgers"],
            "Side Dishes": ["Potato Salad", "Coleslaw", "Pasta Salad", "Corn on the Cob", "Watermelon", "Chips", "Dip", "Cookies", "Brownies"],
            "Accessories & Tableware": ["Ketchup", "Mustard", "Mayonnaise", "Relish", "Paper Plates", "Napkins", "Plastic Silverware"]
        };

        // UI Selectors
        const attendeeListEl = document.getElementById('attendee-list');
        const totalGuestsEl = document.getElementById('total-guests');
        const signupForm = document.getElementById('signup-form');
        const itemsContainer = document.getElementById('items-container');
        const toast = document.getElementById('toast');
        const shareBtn = document.getElementById('share-btn');
        
        // Custom Item Selectors
        const customItemInput = document.getElementById('custom-item-name');
        const customCategorySelect = document.getElementById('custom-item-category');
        const addCustomBtn = document.getElementById('add-custom-btn');

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        setupListeners();
                    }
                });
            } catch (error) {
                console.error("Initialization error:", error);
            }
        }

        function setupListeners() {
            if (!currentUser) return;

            // Listen for attendees
            const attendeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'attendees');
            onSnapshot(attendeesRef, (snapshot) => {
                attendees = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAttendees();
            });

            // Listen for custom added items
            const customItemsRef = collection(db, 'artifacts', appId, 'public', 'data', 'custom_items');
            onSnapshot(customItemsRef, (snapshot) => {
                customItems = snapshot.docs.map(doc => doc.data());
                renderPotluckItems();
            });
        }

        function renderPotluckItems() {
            itemsContainer.innerHTML = '';
            
            // Merge defaults with custom items
            const categories = JSON.parse(JSON.stringify(defaultCategories));
            customItems.forEach(item => {
                if (categories[item.category]) {
                    if (!categories[item.category].includes(item.name)) {
                        categories[item.category].push(item.name);
                    }
                }
            });

            Object.keys(categories).forEach(catName => {
                const catWrapper = document.createElement('div');
                catWrapper.className = "mb-4";
                catWrapper.innerHTML = `
                    <h4 class="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-2 border-b border-orange-100 pb-1">${catName}</h4>
                    <div class="grid grid-cols-1 gap-1">
                        ${categories[catName].map(item => `
                            <label class="flex items-center space-x-2 p-1 rounded hover:bg-orange-50 text-sm cursor-pointer transition-colors">
                                <input type="checkbox" name="items" value="${item}" class="rounded text-orange-600 focus:ring-orange-500"> 
                                <span class="text-gray-700">${item}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                itemsContainer.appendChild(catWrapper);
            });
        }

        function renderAttendees() {
            attendeeListEl.innerHTML = '';
            let totalCount = 0;

            if (attendees.length === 0) {
                attendeeListEl.innerHTML = '<p class="text-gray-400 italic text-center py-8 text-sm">No one has signed up yet!</p>';
            }

            attendees.forEach(person => {
                totalCount += (1 + (person.guests || 0));
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-3 flex justify-between items-start animate-in fade-in slide-in-from-bottom-2 duration-300";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-gray-800">${person.name}</h3>
                            ${person.guests > 0 ? `<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-bold">+${person.guests} guests</span>` : ''}
                        </div>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${(person.items || []).map(i => `<span class="bg-orange-100 text-orange-700 text-[10px] px-2 py-1 rounded-md font-bold border border-orange-200">${i}</span>`).join('')}
                            ${(!person.items || person.items.length === 0) ? '<span class="text-[10px] text-gray-400 italic">Bringing high spirits!</span>' : ''}
                        </div>
                    </div>
                    ${person.userId === currentUser?.uid ? `
                        <button onclick="window.removeAttendee('${person.id}')" class="text-red-300 hover:text-red-500 p-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    ` : ''}
                `;
                attendeeListEl.appendChild(card);
            });
            totalGuestsEl.textContent = totalCount;
        }

        // Add a completely new item to the shared pool
        addCustomBtn.onclick = async (e) => {
            e.preventDefault(); // Prevent form submission if triggered inside form
            const name = customItemInput.value.trim();
            const category = customCategorySelect.value;
            if (!name || !currentUser) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'custom_items'), {
                    name: name,
                    category: category,
                    addedBy: currentUser.uid,
                    timestamp: new Date().toISOString()
                });
                customItemInput.value = '';
                showToast(`Added "${name}" to the list!`);
            } catch (e) {
                console.error(e);
            }
        };

        window.removeAttendee = async (id) => {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendees', id));
                showToast("Entry removed.");
            } catch (err) {
                console.error(err);
            }
        };

        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            const formData = new FormData(signupForm);
            const name = formData.get('userName').trim();
            if (!name) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendees'), {
                    name: name,
                    guests: parseInt(formData.get('guestCount')) || 0,
                    items: Array.from(formData.getAll('items')),
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString()
                });
                signupForm.reset();
                showToast("Success! You're on the list.");
            } catch (err) {
                console.error(err);
                showToast("Error saving. Try again.");
            }
        };

        // Share functionality
        shareBtn.onclick = async () => {
            const shareData = {
                title: 'Hunt Club BBQ RSVP',
                text: 'Hey! Join us for the Hunt Club BBQ on April 24th. Sign up here:',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Fallback to clipboard
                    const dummy = document.createElement('input');
                    document.body.appendChild(dummy);
                    dummy.value = window.location.href;
                    dummy.select();
                    document.execCommand('copy');
                    document.body.removeChild(dummy);
                    showToast("Link copied to clipboard! Send it to the family.");
                }
            } catch (err) {
                console.log('Error sharing:', err);
            }
        };

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Rowdies:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fffaf5; color: #1f2937; }
        .title-font { font-family: 'Rowdies', cursive; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-orange-600 text-white py-16 px-4 text-center shadow-xl relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/></pattern></defs>
                <rect width="100%" height="100%" fill="url(#grid)" />
            </svg>
        </div>
        <div class="relative z-10">
            <h1 class="text-5xl md:text-6xl title-font mb-4 drop-shadow-lg text-white">Hunt Club BBQ/Picnic</h1>
            <div class="flex flex-col items-center gap-4">
                <div class="inline-flex items-center bg-orange-700/50 backdrop-blur-sm px-6 py-2 rounded-full border border-orange-400/30">
                    <span class="opacity-95 italic font-bold tracking-wider">Sat April 24, 2026 • 2:00pm</span>
                </div>
                <button id="share-btn" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 backdrop-blur-md px-4 py-2 rounded-xl border border-white/20 text-sm font-bold transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                    Share Invite
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-12 grid lg:grid-cols-12 gap-8">
        
        <!-- Attendance Side (Left) -->
        <div class="lg:col-span-7">
            <div class="bg-white rounded-2xl shadow-xl p-8 border-t-8 border-orange-500 min-h-[400px]">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-extrabold text-gray-800">The Guest List</h2>
                        <p class="text-gray-400 text-sm">Real-time RSVPs</p>
                    </div>
                    <div class="bg-orange-50 text-orange-600 px-5 py-3 rounded-2xl font-black text-center shadow-inner border border-orange-100">
                        <span id="total-guests" class="text-3xl block leading-none">0</span>
                        <span class="text-[10px] uppercase tracking-tighter opacity-70">Total Guests</span>
                    </div>
                </div>
                
                <div id="attendee-list" class="max-h-[750px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Attendees populated by JS -->
                </div>
            </div>
        </div>

        <!-- Unified RSVP & Add Item Side (Right) -->
        <div class="lg:col-span-5">
            <div class="bg-white rounded-2xl shadow-xl p-8 border-t-8 border-orange-500 sticky top-8">
                <form id="signup-form" class="space-y-6">
                    <h2 class="text-2xl font-extrabold text-gray-800">Count Me In!</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-1">
                            <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Your Name</label>
                            <input type="text" name="userName" required placeholder="Ex: Drew" class="w-full border p-3 rounded-xl text-sm outline-none focus:ring-4 focus:ring-orange-100 border-gray-100 transition-all bg-gray-50/50">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">Extra Guests</label>
                            <input type="number" name="guestCount" value="0" min="0" class="w-full border p-3 rounded-xl text-sm outline-none focus:ring-4 focus:ring-orange-100 border-gray-100 transition-all bg-gray-50/50">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-3">
                            <label class="text-sm font-bold text-gray-700">Check what you're bringing:</label>
                        </div>
                        <div id="items-container" class="h-64 overflow-y-auto border border-gray-100 p-4 rounded-2xl bg-gray-50/30 custom-scrollbar mb-4">
                            <!-- Categorized items populated by JS -->
                        </div>
                    </div>

                    <!-- Integrated "Something Missing" Section -->
                    <div class="bg-orange-50/50 rounded-xl p-4 border border-orange-100 mb-6">
                        <h3 class="text-[10px] font-black text-orange-800 uppercase mb-3 tracking-widest flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                            Add New Potluck Item
                        </h3>
                        <div class="space-y-2">
                            <input type="text" id="custom-item-name" placeholder="Item name (e.g. Audrey's Famous Cookies)" class="w-full border p-2.5 rounded-lg text-xs border-orange-200 outline-none focus:ring-4 focus:ring-orange-200/30 bg-white">
                            <div class="flex gap-2">
                                <select id="custom-item-category" class="flex-1 border p-2.5 rounded-lg text-xs border-orange-200 outline-none bg-white">
                                    <option value="Main Dishes">Main Dish</option>
                                    <option value="Side Dishes" selected>Side Dish</option>
                                    <option value="Accessories & Tableware">Accessories</option>
                                </select>
                                <button id="add-custom-btn" type="button" class="bg-orange-600 text-white px-4 rounded-lg font-bold text-xs hover:bg-orange-700 transition-all active:scale-95 shadow-md shadow-orange-200">
                                    Add to List
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-orange-600 text-white font-black py-5 rounded-2xl hover:bg-orange-700 transition-all active:scale-95 shadow-xl shadow-orange-200 uppercase tracking-widest text-lg">
                        Confirm RSVP
                    </button>
                    
                    <p class="text-[10px] text-gray-400 text-center italic mt-4">
                        Family Reminder: BYOB (Bring Your Own Beverages)!
                    </p>
                </form>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-md text-white px-10 py-4 rounded-2xl text-xs font-bold shadow-2xl z-50 animate-bounce border border-white/10"></div>

</body>
</html>
